version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: starvia_postgres
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: deliverydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
